name: Daily Data Update

on:
  schedule:
    # 11:05 UTC = 08:05 (America/Sao_Paulo)
    - cron: "5 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update news feeds
        shell: pwsh
        run: ./scripts/update-news.ps1

      - name: Update market indicators
        shell: pwsh
        run: ./scripts/update-market.ps1

      - name: Commit and push if changed
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add `
            news/data/noticias.json `
            news/data/noticias.js `
            news/data/mercado.json `
            news/data/mercado.js

          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Sem alterações para commit."
            exit 0
          }

          git commit -m "chore: atualiza news e mercado"
          git push origin HEAD:main
